name: "Test sitemap with k6 and export dashboard"
description: "Run k6 against webpage's sitemap, export HTML dashboard, and create a PNG screenshot"

branding:
  icon: 'message-circle'
  color: 'blue'

inputs:
  base_output_dir:
    required: false
    default: "results"
    description: "Directory where the HTML dashboard and PNG screenshot will be saved (default: results)"
    type: string
  base_url:
    required: true
    description: "Base URL (e.g. https://yourdomain.com)"
    type: string
  sitemap_url:
    required: false
    default: ""
    description: "Sitemap URL (defaults to BASE_URL/sitemap.xml)"
    type: string
  vus:
    required: false
    default: "5"
    description: "Number of virtual users (VUs) to simulate"
    type: string
  duration:
    required: false
    default: "1m"
    description: "Duration of the test (e.g. 30s, 1m, 5m)"
    type: string
  url_limit:
    required: false
    default: "500"
    description: "Maximum number of URLs to test from the sitemap"
    type: string
  http_timeout:
    required: false
    default: "5s"
    description: "Timeout for HTTP"
    type: string

outputs:
  dashboard_html:
    description: "The HTML dashboard generated by k6"
  dashboard_png:
    description: "PNG screenshot of the HTML dashboard"

runs:
  using: "docker"
  image: "Dockerfile"
