name: "Test sitemap with k6 and export dashboard"
description: "Run k6 against webpage's sitemap, export HTML dashboard, and create a PNG screenshot"

inputs:
  base_url:
    required: true
    description: "Base URL (e.g. https://yourdomain.com)"
    type: string
  sitemap_url:
    required: false
    default: ""
    description: "Sitemap URL (defaults to BASE_URL/sitemap.xml)"
    type: string
  vus:
    required: false
    default: "5"
    description: "Number of virtual users (VUs) to simulate"
    type: string
  duration:
    required: false
    default: "1m"
    description: "Duration of the test (e.g. 30s, 1m, 5m)"
    type: string
  url_limit:
    required: false
    default: "500"
    description: "Maximum number of URLs to test from the sitemap"
    type: string
  redirect_limit:
    required: false
    default: "5"
    description: "Maximum number of redirects to follow per URL"
    type: string
  test_mode:
    required: false
    default: "vus"
    description: "The test mode to run (vus (constant VUs for DURATION (classic concurrency test) , rate (constant arrival rate for DURATION))"
    type: string

outputs:
  dashboard_html:
    description: "The HTML dashboard generated by k6"
    value: "${{ steps.k6.outputs.dashboard_html }}"
  dashboard_png:
    description: "PNG screenshot of the HTML dashboard"
    value: "${{ steps.playwright.outputs.dashboard_png }}"
  artifact:
    description: "The id of the uploaded artifact containing the dashboard png"
    value: "${{ steps.upload.outputs.artifact-id }}"


runs:
  using: "composite"
  steps:
    - name: Run k6 (export HTML dashboard)
      id: k6
      shell: bash
      env:
        BASE_URL: ${{ inputs.base_url }}
        SITEMAP_URL: ${{ inputs.sitemap_url }}
        VUS: ${{ inputs.vus }}
        DURATION: ${{ inputs.duration }}
        URL_LIMIT: ${{ inputs.url_limit }}
        REDIRECT_LIMIT: ${{ inputs.redirect_limit }}
        TEST_MODE: ${{ inputs.test_mode }}
        K6_WEB_DASHBOARD: "true"
        K6_WEB_DASHBOARD_EXPORT: "results/artifacts/k6-report.html"
      run: |
        mkdir -p "results/artifacts"
        k6 run /opt/analyze-sitemap.js
        echo "dashboard_html=artifacts/k6-report.html" >> $GITHUB_OUTPUT

    - name: Screenshot dashboard to PNG
      shell: bash
      id: playwright
      env:
        REPORT_HTML: "results/artifacts/k6-report.html"
        OUT_DIR: "results/artifacts/images"
      run: |
        node /opt/load-dashboard.mjs
        echo "dashboard_png=artifacts/images/dashboard.png" >> $GITHUB_OUTPUT
    
    - name: Upload reports
      id: upload
      uses: actions/upload-artifact@v6
      with:
        name: k6-sitemap-reports-${{ github.run_id }}
        path: results/artifacts