name: Update repo and webpage
run-name: ${{ github.workflow }} (#${{ github.run_id }})

permissions:
  contents: write
  id-token: write
  pages: write

on:
    workflow_dispatch:

jobs:
    update-readme:
      uses: ./.github/workflows/update-readme.yml

    update-website:
      needs: update-readme
      uses: ./.github/workflows/update-webpage.yml

