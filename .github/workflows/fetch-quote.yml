name: Update quote of the day
run-name: ${{ github.workflow }} (#${{ github.run_id }})

on:
  schedule:
    - cron: '0 7 * * *' # Every day at 07:00 UTC
  push:
      branches: [main]
      paths:
      - 'scripts/get_quote.go'
      - '.github/workflows/fetch-quote.yml'
      - '.github/actions/fetch-quote/**'
  workflow_dispatch:

permissions: {}

jobs:
    get-quote:
        runs-on: ubuntu-latest
        name: Fetch and update quote of the day
        env:
          PR_BRANCH: "update-quote-${{ github.run_id }}"
    
        permissions:
          contents: write
          pull-requests: write

        concurrency:
            group: quote-${{ github.ref }}
            cancel-in-progress: false

        steps:
        # - name: Configure monitor
        #   uses: GitHubSecurityLab/actions-permissions/monitor@v1

        - name: Checkout repository
          uses: actions/checkout@v6.0.3
          with:
            persist-credentials: true
    
        - name: Fetch Quote of the Day
          id: quote
          uses: ./.github/actions/fetch-quote
    
        - name: Create quote frontmatter file
          run: |
            mkdir -p content/page/quote
            cat > content/page/quote/_index.md << EOF
            ---
            title: "Today's quote"
            slug: "quote"
            layout: "quote"
            
            quote:
              image: "${{ steps.quote.outputs.image }}"
              author: "${{ steps.quote.outputs.author }}"
              text: "${{ steps.quote.outputs.quote }}"
            
            menu:
                main:
                    weight: 6
                    params: 
                        icon: quote
            ---
            EOF
    
        - name: Create Pull Request
          id: create_pr
          uses: peter-evans/create-pull-request@v8.1.1
          with:
            token: ${{ secrets.GITHUB_TOKEN }}
            branch: ${{ env.PR_BRANCH }}
            base: main
            delete-branch: true
            title: "chore: :hammer: Update quote of the day"
            body: "Automated update: update quote of the day"

        - name: Wait for PR to be merged
          uses: actions/github-script@v6
          with:
            github-token: ${{ secrets.GITHUB_TOKEN }}
            script: |
              const prNumber = Number("${{ steps.create_pr.outputs.pull-request-number }}");

              if (!prNumber || Number.isNaN(prNumber)) {
                core.setFailed(
                  "No PR number received. Check."
                );
                return;
              }

              console.log(`Waiting for PR #${prNumber} to be merged`);

              while (true) {
                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                });

                if (pr.merged) {
                  console.log(`PR #${prNumber} has been merged!`);
                  break;
                }

                console.log(`PR #${prNumber} is not merged yet. Checking again in 90 seconds...`);
                await new Promise(resolve => setTimeout(resolve, 90000));
              }
  
        - name: Display quote in summary
          run: |
            echo "## 📅 Quote of the Day Updated" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> ${{ steps.quote.outputs.quote }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**— ${{ steps.quote.outputs.author }}**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "![Author](${{ steps.quote.outputs.image }})" >> $GITHUB_STEP_SUMMARY

    deploy:
        needs: get-quote
        name: Deploy page
        permissions:
          contents: read
          pages: write
          id-token: write
        uses: nclsbayona/nclsbayona.github.io/.github/workflows/deploy.yml@main
