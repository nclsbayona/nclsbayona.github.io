name: Semantic Release
run-name: ${{ github.workflow }} (#${{ github.run_id }})

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 1 */2 *"

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "lts/*"

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          dry_run: ${{ github.event_name == 'workflow_dispatch' }}
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output new release version
        run: |
          if [ "${{ steps.semantic.outputs.new_release_version }}" != "" ]; then
            printf "New release version: ${{ steps.semantic.outputs.new_release_version }} ."
          else
            printf "No new release version."
          fi
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            printf "Published to GitHub."
          else
            printf "Dry run, not published to GitHub."
          fi
