name: Update visualizations
on:
  page_build:
  deployment: 
  workflow_dispatch:

concurrency:
  group: visual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Make GIF
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    # - name: Configure monitor
    #   uses: GitHubSecurityLab/actions-permissions/monitor@v1
    - uses: actions/checkout@v6
      with:
        persist-credentials: true
    - name: Website to file
      uses: PabloLec/website-to-gif@2.1.5
      with:
        url: "https://nclsbayona.github.io"
        scroll_step: 2
        save_path: "/artifacts/images/"
    - name: Commit changes
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: "docs: :memo: Update website gif"

  generate_png:
    permissions:
      contents: write
    needs: build
    name: Generate Test Results
    uses: nclsbayona/nclsbayona.github.io/.github/workflows/test-sitemap.yml@main
    with:
      users: "100"
      duration: "3m"
      base_url: "https://nclsbayona.github.io"
      sitemap_url: "https://nclsbayona.github.io/sitemap.xml"
      url_limit: "500"
      redirect_limit: "5"
      test_mode: "rate"