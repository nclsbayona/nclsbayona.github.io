name: Update visualizations
on:
  deployment: 
  workflow_dispatch:

concurrency:
  group: visual-${{ github.ref }}
  cancel-in-progress: true

env:
  ARTIFACTS_DIR: "artifacts"

jobs:
  make-gif:
    name: Make GIF
    runs-on: ubuntu-latest
    env:
      PR_BRANCH: update-website-gif-${{ github.run_id }}
    outputs:
      pr_branch: ${{ env.PR_BRANCH }}
      pr_url: ${{ steps.create_pr.outputs.pull-request-url }}
      pr_number: ${{ steps.create_pr.outputs.pull-request-number }}
    permissions:
      contents: write
      pull-requests: write
    steps:
    # - name: Configure monitor
    #   uses: GitHubSecurityLab/actions-permissions/monitor@v1
    - uses: actions/checkout@v6.0.3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: ${{ github.ref }}
        persist-credentials: false

    - name: Website to file
      uses: PabloLec/website-to-gif@2.1.5
      with:
        url: "https://nclsbayona.github.io"
        scroll_step: 100
        save_path: "/${{ env.ARTIFACTS_DIR }}/images"

    - name: Create Pull Request
      id: create_pr
      uses: peter-evans/create-pull-request@v8.1.1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ env.PR_BRANCH }}
        base: main
        delete-branch: true
        title: "docs: :memo: Update website gif"
        body: "Automated update: refresh website gif in ${{ env.ARTIFACTS_DIR }}"

  wait-for-gif:
    needs: make-gif
    runs-on: ubuntu-latest
    name: Wait for GIF PR to be merged
    steps:
      - name: Wait for PR to be merged
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = Number("${{ needs.make-gif.outputs.pr_number }}");
            const prUrl = "${{ needs.make-gif.outputs.pr_url }}";

            console.log(`Waiting for PR #${prNumber} to be merged: ${prUrl}`);

            while (true) {
              const { data: pr } = await github.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });

              if (pr.merged) {
                console.log(`PR #${prNumber} has been merged!`);
                break;
              }

              console.log(`PR #${prNumber} is not merged yet. Checking again in 90 seconds...`);
              await new Promise(resolve => setTimeout(resolve, 90000));
            }

  generate_png:
    permissions:
      contents: write
      pull-requests: write
    needs: wait-for-gif
    name: Generate K6 Results
    uses: nclsbayona/nclsbayona.github.io/.github/workflows/test-sitemap.yml@main
    with:
      users: "100"
      duration: "15m"
      base_url: "https://nclsbayona.github.io"
      sitemap_url: "https://nclsbayona.github.io/sitemap.xml"
      url_limit: "500"
      base_output_dir: "artifacts"
