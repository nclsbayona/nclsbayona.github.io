name: Screenshot today's quote as PNG
run-name: ${{ github.workflow }} (#${{ github.run_id }})
on:
    workflow_call:
        inputs:
            page_url:
                type: string
                description: "URL of the page to take a screenshot of"
                required: false
                default: "https://nclsbayona.github.io/page/quote"
            element_id:
                type: string
                description: "ID of the element to take a screenshot of"
                required: false
                default: "quote"
            output_dir:
                type: string
                description: "Directory where the PNG screenshot will be saved (default: artifacts/images)"
                required: false
                default: "artifacts/images"
            screenshot_name:
                type: string
                description: "Name of the PNG screenshot file (default: quote_of_the_day.png)"
                required: false
                default: "quote_of_the_day.png"
            timeout:
                type: number
                description: "Timeout for taking the screenshot in milliseconds (default: 30000)"
                required: false
                default: 30000
            send_telegram_notification:
                type: boolean
                description: "Whether to send a Telegram notification with the quote image"
                required: false
                default: true
            wait_for_merge:
                type: boolean
                description: "Whether to wait for the PR to be merged before proceeding"
                required: false
                default: false
    workflow_dispatch:
        inputs:
            page_url:
                description: "URL of the page to take a screenshot of"
                required: false
                default: "https://nclsbayona.github.io/page/quote"
            element_id:
                description: "ID of the element to take a screenshot of"
                required: false
                default: "quote"
            output_dir:
                description: "Directory where the PNG screenshot will be saved (default: artifacts/images)"
                required: false
                default: "artifacts/images"
            screenshot_name:
                description: "Name of the PNG screenshot file (default: quote_of_the_day.png)"
                required: false
                default: "quote_of_the_day.png"
            timeout:
                description: "Timeout for taking the screenshot in milliseconds (default: 30000)"
                required: false
                type: number
                default: 30000
            send_telegram_notification:
                type: boolean
                description: "Whether to send a Telegram notification with the quote image"
                required: false
                default: true
            wait_for_merge:
                description: "Whether to wait for the PR to be merged before proceeding"
                required: false
                type: boolean
                default: false

concurrency:
    group: screenshot-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: read
    pull-requests: write

env:
    ARTIFACTS_DIR: "${{ inputs.output_dir }}"
    PR_BRANCH: "screenshot-${{ github.run_id }}"

jobs:
    screenshot:
        name: Screenshot today's quote
        runs-on: ubuntu-latest
        outputs:
            screenshot_path: ${{ steps.screenshot.outputs.screenshot_png }}
            pr_branch: ${{ env.PR_BRANCH }}
            pr_url: ${{ steps.create_pr.outputs.pull-request-url }}
            pr_number: ${{ steps.create_pr.outputs.pull-request-number }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7.0.0
              with:
                  ref: ${{ github.ref }}
                  fetch-depth: 1
                  persist-credentials: false

            - name: Take screenshot of today's quote
              id: screenshot
              uses: ./.github/actions/element-screenshot
              with:
                  page_url: ${{ inputs.page_url }}
                  element_id: ${{ inputs.element_id }}
                  output_dir: ${{ env.ARTIFACTS_DIR }}
                  screenshot_name: ${{ inputs.screenshot_name }}
                  timeout: ${{ inputs.timeout }}

            - name: Upload screenshot
              if: success()
              uses: actions/upload-artifact@v7.0.1
              with:
                name: screenshot-${{ github.run_id }}
                path: ${{ env.ARTIFACTS_DIR }}

            - name: Create Pull Request
              id: create_pr
              uses: peter-evans/create-pull-request@v8.1.1
              with:
                token: ${{ secrets.PR_TOKEN }}
                branch: ${{ env.PR_BRANCH }}
                base: main
                delete-branch: true
                commit-message: "chore: Update"
                title: "docs: :memo: Update quote image"
                body: "Automated update: refresh quote in directory ${{ env.ARTIFACTS_DIR }}"
            
            - name: Get date
              id: get_date
              if: ${{ inputs.send_telegram_notification }}
              run: |
                echo "date=$(date -u '+%Y-%m-%d %H:%M')" >> "$GITHUB_OUTPUT"

            - name: Create unique file
              if: ${{ inputs.send_telegram_notification }}
              run: |
                mkdir -p out
                cp "${{ steps.screenshot.outputs.screenshot_png }}" "out/image${{ github.run_id }}.png"

            - name: Send Telegram notification
              if: ${{ inputs.send_telegram_notification }}
              uses: appleboy/telegram-action@v1.0.1
              with:
                to: ${{ secrets.TELEGRAM_CHAT_ID }}
                token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
                message: "${{ steps.get_date.outputs.date }}"
                photo: out/image${{ github.run_id }}.png

    wait-for-screenshot:
        needs: screenshot
        runs-on: ubuntu-latest
        name: Wait for Test PR to be merged
        if: ${{ inputs.wait_for_merge }}
        steps:
        - name: Debug PR outputs
          run: |
            echo "number=${{ needs.screenshot.outputs.pr_number }}"
            echo "url=${{ needs.screenshot.outputs.pr_url }}"

        - name: Wait for PR to be merged
          if: ${{ (github.event_name == 'workflow_call' && github.event.inputs.wait_for_merge) || (github.event_name == 'workflow_dispatch' && inputs.WAIT_FOR_MERGE) }}
          uses: actions/github-script@v9
          with:
            github-token: ${{ secrets.GITHUB_TOKEN }}
            script: |
                const prNumber = Number("${{ needs.screenshot.outputs.pr_number }}");

                if (!prNumber || Number.isNaN(prNumber)) {
                console.log(
                    "No PR number received. Check."
                );
                return;
                }

                console.log(`Waiting for PR #${prNumber} to be merged`);

                while (true) {
                const { data: pr } = await github.rest.pulls.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                });

                if (pr.merged) {
                    console.log(`PR #${prNumber} has been merged!`);
                    break;
                }

                console.log(`PR #${prNumber} is not merged yet. Checking again in 90 seconds...`);
                await new Promise(resolve => setTimeout(resolve, 90000));
                }
