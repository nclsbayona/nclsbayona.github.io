name: Update theme
run-name: ${{ github.workflow }} (#${{ github.run_id }})

# Controls when the workflow will run
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-theme.yml'
  schedule:
    # Update theme automatically everyday at 01:00 UTC
    - cron: "0 1 * * *"

jobs:
  update-theme:
    runs-on: ubuntu-latest
    name: Update theme
    env:
      PR_BRANCH: "update-theme-${{ github.run_id }}"

    permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push the
      # added or changed files to the repository.
      contents: write
    
    steps:
      - uses: actions/checkout@v6.0.3
        with:
            persist-credentials: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.140.2"
          extended: true

      - name: Update theme
        run: hugo mod get -u github.com/CaiJimmy/hugo-theme-stack/v3

      - name: Tidy go.mod, go.sum
        run: hugo mod tidy

      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ env.PR_BRANCH }}
          base: main
          delete-branch: true
          title: "ci: :arrow_up: Update theme"
          body: "Automated update: update theme"

      - name: Wait for PR to be merged
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = Number("${{ steps.create_pr.outputs.pull-request-number }}");

            if (!prNumber || Number.isNaN(prNumber)) {
              core.setFailed(
                "No PR number received. Check."
              );
              return;
            }

            console.log(`Waiting for PR #${prNumber} to be merged`);

            while (true) {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });

              if (pr.merged) {
                console.log(`PR #${prNumber} has been merged!`);
                break;
              }

              console.log(`PR #${prNumber} is not merged yet. Checking again in 90 seconds...`);
              await new Promise(resolve => setTimeout(resolve, 90000));
            }"
