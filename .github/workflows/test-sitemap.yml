name: Load test sitemap
run-name: ${{ github.workflow }} (#${{ github.run_id }})

on:
  workflow_call:
    inputs:
      base_url:
        type: string
        description: "Base URL (e.g. https://yourdomain.com)"
        required: false
        default: "https://nclsbayona.github.io"
      sitemap_url:
        type: string
        description: "Sitemap URL"
        required: false
        default: "https://nclsbayona.github.io/sitemap.xml"
      users:
        type: string
        description: "Number of virtual users (VUs) to simulate"
        required: false
        default: "5"
      duration:
        type: string
        description: "Duration of the test (e.g. 30s, 1m, 5m)"
        required: false
        default: "1m"
      url_limit:
        type: string
        description: "Maximum number of URLs to test from the sitemap"
        required: false
        default: "500"
      http_timeout:
        type: string
        description: "The timeout for HTTP"
        required: false
        default: "5s"
      base_output_dir:
        type: string
        description: "Directory where the HTML dashboard and PNG screenshot will be saved (default: results)"
        required: false
        default: "artifacts"
      wait_for_merge:
        type: boolean
        description: "Whether to wait for the PR to be merged before proceeding"
        required: false
        default: true
    

  workflow_dispatch:
    inputs:
      BASE_URL:
        description: "Base URL (e.g. https://yourdomain.com)"
        required: false
        default: "https://nclsbayona.github.io"
      SITEMAP_URL:
        description: "Sitemap URL"
        required: false
        default: "https://nclsbayona.github.io/sitemap.xml"
      VUS:
        description: "Number of virtual users (VUs) to simulate"
        required: false
        default: "5"
      DURATION:
        description: "Duration of the test (e.g. 30s, 1m, 5m)"
        required: false
        default: "1m"
      URL_LIMIT:
        description: "Maximum number of URLs to test from the sitemap"
        required: false
        default: "500"
      HTTP_TIMEOUT:
        type: string
        description: "The timeout for HTTP"
        required: false
        default: "5s"
      BASE_OUTPUT_DIR:
        description: "Directory where the HTML dashboard and PNG screenshot will be saved (default: results)"
        required: false
        default: "artifacts"
      wait_for_merge:
        type: boolean
        description: "Whether to wait for the PR to be merged before proceeding"
        required: false
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run sitemap analysis
    permissions:
      contents: write
      pull-requests: write
    env:
      PR_BRANCH: "update-gif-${{ github.run_id }}"
      ARTIFACTS_DIR: ${{ github.event.inputs.BASE_OUTPUT_DIR || inputs.base_output_dir }}
    outputs:
      pr_branch: ${{ env.PR_BRANCH }}
      pr_url: ${{ steps.create_pr.outputs.pull-request-url }}
      pr_number: ${{ steps.create_pr.outputs.pull-request-number }}
    steps:
      # - name: Configure monitor
      #   uses: GitHubSecurityLab/actions-permissions/monitor@v1

      - uses: actions/checkout@v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}
          persist-credentials: false

      - name: Create directory for Artifacts
        run: |
          mkdir -p ${{ env.ARTIFACTS_DIR }}

      - name: Run sitemap action
        id: test
        uses: ./.github/actions/k6-sitemap
        with:
          base_output_dir: ${{ env.ARTIFACTS_DIR }}
          base_url: ${{ github.event.inputs.BASE_URL || inputs.base_url }}
          sitemap_url: ${{ github.event.inputs.SITEMAP_URL || inputs.sitemap_url }}
          vus: ${{ github.event.inputs.VUS || inputs.users }}
          duration: ${{ github.event.inputs.DURATION || inputs.duration }}
          http_timeout: ${{ github.event.inputs.HTTP_TIMEOUT || inputs.http_timeout }}
          url_limit: ${{ github.event.inputs.URL_LIMIT || inputs.url_limit }}

      - name: Upload reports
        if: success()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: k6-sitemap-reports-${{ github.run_id }}
          path: ${{ env.ARTIFACTS_DIR }}

      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.PR_TOKEN }}
          branch: ${{ env.PR_BRANCH }}
          base: main
          delete-branch: true
          commit-message: "chore: Update"
          title: "docs: :memo: Update loadtest image"
          body: "Automated update: refresh loadtest in directory ${{ env.ARTIFACTS_DIR }}"


  wait-for-test:
    needs: test
    runs-on: ubuntu-latest
    name: Wait for Test PR to be merged
    if: ${{ inputs.wait_for_merge }}
    steps:
      - name: Debug PR outputs
        run: |
          echo "number=${{ needs.test.outputs.pr_number }}"
          echo "url=${{ needs.test.outputs.pr_url }}"

      - name: Wait for PR to be merged
        if: ${{ (github.event_name == 'workflow_call' && github.event.inputs.wait_for_merge) || (github.event_name == 'workflow_dispatch' && inputs.WAIT_FOR_MERGE) }}
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = Number("${{ needs.test.outputs.pr_number }}");

            if (!prNumber || Number.isNaN(prNumber)) {
              console.log(
                "No PR number received. Check."
              );
              return;
            }

            console.log(`Waiting for PR #${prNumber} to be merged`);

            while (true) {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });

              if (pr.merged) {
                console.log(`PR #${prNumber} has been merged!`);
                break;
              }

              console.log(`PR #${prNumber} is not merged yet. Checking again in 90 seconds...`);
              await new Promise(resolve => setTimeout(resolve, 90000));
            }
