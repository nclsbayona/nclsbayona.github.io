version: 2
updates:
  # GitHub Actions - all workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    cooldown:
      default-days: 20
    labels:
      - "dependencies"
    assignees:
      - "nclsbayona"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "ci"
      include: "scope"

  # Go modules - Hugo theme dependencies (root)
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
    assignees:
      - "nclsbayona"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "build"
      include: "scope"

  # Go modules - Quote fetcher action
  - package-ecosystem: "gomod"
    directory: "/.github/actions/fetch-quote"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 15
    labels:
      - "dependencies"
    assignees:
      - "nclsbayona"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "build"
      include: "scope"

  # Docker - Quote fetcher action
  - package-ecosystem: "docker"
    directory: "/.github/actions/fetch-quote"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
    assignees:
      - "nclsbayona"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "build"
      include: "scope"

  # Docker - K6 sitemap action
  - package-ecosystem: "docker"
    directory: "/.github/actions/k6-sitemap"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
    assignees:
      - "nclsbayona"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "build"
      include: "scope"

  # GitHub Actions - K6 sitemap action
  - package-ecosystem: "github-actions"
    directory: "/.github/actions/k6-sitemap"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
    assignees:
      - "nclsbayona"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "github_actions"
      include: "scope"

  # Docker - Element screenshot action
  - package-ecosystem: "docker"
    directory: "/.github/actions/element-screenshot"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
    assignees:
      - "nclsbayona"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "build"
      include: "scope"

  # GitHub Actions - Element screenshot action
  - package-ecosystem: "github-actions"
    directory: "/.github/actions/element-screenshot"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
    assignees:
      - "nclsbayona"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "github_actions"
      include: "scope"

  # Docker - devcontainer
  - package-ecosystem: "docker"
    directory: "/.devcontainer"
    schedule:
      interval: "weekly"
      day: "wednesday"
    cooldown:
      default-days: 15
    labels:
      - "dependencies"
    assignees:
      - "nclsbayona"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "build"
      include: "scope"

  # Devcontainer - devcontainer
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
    cooldown:
      default-days: 15
    labels:
      - "dependencies"
    assignees:
      - "nclsbayona"
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "build"
      include: "scope"
